workflows:
  ios-app-store:
    name: Butte Strong Wellness — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      groups:
        - manual_signing  # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      vars:
        BUNDLE_ID: com.buttestrongwellness.app
        APPLE_TEAM_ID: DJAXSSFY8H
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add and sync Capacitor iOS
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Generate iOS app icons
        script: |
          ICON_SRC="resources/icon.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          sips -z 20   20   "$ICON_SRC" --out "$ICON_DIR/icon-20.png"
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/icon-20@2x.png"
          sips -z 60   60   "$ICON_SRC" --out "$ICON_DIR/icon-20@3x.png"
          sips -z 29   29   "$ICON_SRC" --out "$ICON_DIR/icon-29.png"
          sips -z 58   58   "$ICON_SRC" --out "$ICON_DIR/icon-29@2x.png"
          sips -z 87   87   "$ICON_SRC" --out "$ICON_DIR/icon-29@3x.png"
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/icon-40.png"
          sips -z 80   80   "$ICON_SRC" --out "$ICON_DIR/icon-40@2x.png"
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/icon-40@3x.png"
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/icon-60@2x.png"
          sips -z 180  180  "$ICON_SRC" --out "$ICON_DIR/icon-60@3x.png"
          sips -z 76   76   "$ICON_SRC" --out "$ICON_DIR/icon-76.png"
          sips -z 152  152  "$ICON_SRC" --out "$ICON_DIR/icon-76@2x.png"
          sips -z 167  167  "$ICON_SRC" --out "$ICON_DIR/icon-83.5@2x.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/icon-1024.png"
          cat > "$ICON_DIR/Contents.json" << 'CONTENTS'
          {
            "images": [
              {"idiom":"iphone","scale":"1x","size":"20x20","filename":"icon-20.png"},
              {"idiom":"iphone","scale":"2x","size":"20x20","filename":"icon-20@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"20x20","filename":"icon-20@3x.png"},
              {"idiom":"iphone","scale":"1x","size":"29x29","filename":"icon-29.png"},
              {"idiom":"iphone","scale":"2x","size":"29x29","filename":"icon-29@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"29x29","filename":"icon-29@3x.png"},
              {"idiom":"iphone","scale":"1x","size":"40x40","filename":"icon-40.png"},
              {"idiom":"iphone","scale":"2x","size":"40x40","filename":"icon-40@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"40x40","filename":"icon-40@3x.png"},
              {"idiom":"iphone","scale":"2x","size":"60x60","filename":"icon-60@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"60x60","filename":"icon-60@3x.png"},
              {"idiom":"ipad","scale":"1x","size":"20x20","filename":"icon-20.png"},
              {"idiom":"ipad","scale":"2x","size":"20x20","filename":"icon-20@2x.png"},
              {"idiom":"ipad","scale":"1x","size":"29x29","filename":"icon-29.png"},
              {"idiom":"ipad","scale":"2x","size":"29x29","filename":"icon-29@2x.png"},
              {"idiom":"ipad","scale":"1x","size":"40x40","filename":"icon-40.png"},
              {"idiom":"ipad","scale":"2x","size":"40x40","filename":"icon-40@2x.png"},
              {"idiom":"ipad","scale":"1x","size":"76x76","filename":"icon-76.png"},
              {"idiom":"ipad","scale":"2x","size":"76x76","filename":"icon-76@2x.png"},
              {"idiom":"ipad","scale":"2x","size":"83.5x83.5","filename":"icon-83.5@2x.png"},
              {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"icon-1024.png"}
            ],
            "info": {"author":"xcode","version":1}
          }
          CONTENTS

      - name: Inject Info.plist privacy strings and build number
        script: |
          PLIST="ios/App/App/Info.plist"
          # Use Codemagic's auto-incrementing build number so each upload is unique
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" "$PLIST"
          # Required privacy strings
          plutil -insert NSLocationWhenInUseUsageDescription -string "This app does not use your location." "$PLIST" 2>/dev/null || true
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "This app does not use your location." "$PLIST" 2>/dev/null || true
          plutil -insert NSCameraUsageDescription -string "This app does not use your camera." "$PLIST" 2>/dev/null || true
          plutil -insert NSPhotoLibraryUsageDescription -string "This app does not use your photo library." "$PLIST" 2>/dev/null || true
          plutil -insert NSMicrophoneUsageDescription -string "This app does not use your microphone." "$PLIST" 2>/dev/null || true

      - name: Set up keychain and signing
        script: |
          keychain initialize
          # Import distribution certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - tricerri@gmail.com
        notify:
          success: true
          failure: true

  android-google-play:
    name: Butte Strong Wellness — Android Google Play
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 22
      java: 21
      # Codemagic injects CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS,
      # CM_KEY_PASSWORD from the keystore stored under this reference name.
      # Create it in: App settings → Code signing identities → Android keystores.
      android_signing:
        - buttestrong_keystore
      vars:
        PACKAGE_NAME: com.buttestrongwellness.app

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add and sync Capacitor Android
        script: |
          # android/ is not committed — it is generated fresh on every build
          npx cap add android || true
          npx cap sync android

      - name: Generate Android app icons and splash
        script: |
          # @capacitor/assets builds adaptive launcher icons + splash from a single logo
          mkdir -p assets
          cp resources/icon.png assets/logo.png
          npx @capacitor/assets@3 generate \
            --android \
            --iconBackgroundColor '#0B1F4A' \
            --iconBackgroundColorDark '#0B1F4A' \
            --splashBackgroundColor '#0B1F4A' \
            --splashBackgroundColorDark '#0B1F4A' \
            || echo "WARNING: icon generation failed — build will use default Capacitor icons"

      - name: Inject version code and release signing config
        script: |
          # android/app/build.gradle is regenerated each build, so patch it at build time
          python3 - <<'PY'
          import os, re

          path = "android/app/build.gradle"
          with open(path) as f:
              gradle = f.read()

          # Auto-incrementing versionCode from Codemagic; keep versionName in sync with iOS (1.0)
          build_number = os.environ.get("BUILD_NUMBER", "1")
          gradle = re.sub(r'versionCode\s+\d+', f'versionCode {build_number}', gradle, count=1)
          gradle = re.sub(r'versionName\s+"[^"]*"', 'versionName "1.0"', gradle, count=1)

          # Release signing config that reads the keystore Codemagic injected via env vars
          signing_block = '''
              signingConfigs {
                  release {
                      storeFile file(System.getenv("CM_KEYSTORE_PATH"))
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("CM_KEY_ALIAS")
                      keyPassword System.getenv("CM_KEY_PASSWORD")
                  }
              }
          '''
          gradle = gradle.replace("android {", "android {\n" + signing_block, 1)

          # Point the release build type at the signing config
          gradle = re.sub(
              r'(buildTypes\s*\{\s*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              gradle, count=1)

          with open(path, "w") as f:
              f.write(gradle)

          print("Patched build.gradle:")
          print(gradle)
          PY

      - name: Build signed AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - tricerri@gmail.com
        notify:
          success: true
          failure: true
      # To auto-publish to Play later, add a Google Play service account JSON in
      # Codemagic and uncomment below (first release for a new app must be
      # uploaded manually via the Play Console):
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true
