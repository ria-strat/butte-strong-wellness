workflows:
  ios-app-store:
    name: Butte Strong Wellness — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      groups:
        - manual_signing  # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      vars:
        BUNDLE_ID: com.buttestrongwellness.app
        APPLE_TEAM_ID: DJAXSSFY8H
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add and sync Capacitor iOS
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Generate iOS app icons
        script: |
          ICON_SRC="resources/icon.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          sips -z 20   20   "$ICON_SRC" --out "$ICON_DIR/icon-20.png"
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/icon-20@2x.png"
          sips -z 60   60   "$ICON_SRC" --out "$ICON_DIR/icon-20@3x.png"
          sips -z 29   29   "$ICON_SRC" --out "$ICON_DIR/icon-29.png"
          sips -z 58   58   "$ICON_SRC" --out "$ICON_DIR/icon-29@2x.png"
          sips -z 87   87   "$ICON_SRC" --out "$ICON_DIR/icon-29@3x.png"
          sips -z 40   40   "$ICON_SRC" --out "$ICON_DIR/icon-40.png"
          sips -z 80   80   "$ICON_SRC" --out "$ICON_DIR/icon-40@2x.png"
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/icon-40@3x.png"
          sips -z 120  120  "$ICON_SRC" --out "$ICON_DIR/icon-60@2x.png"
          sips -z 180  180  "$ICON_SRC" --out "$ICON_DIR/icon-60@3x.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/icon-1024.png"
          cat > "$ICON_DIR/Contents.json" << 'CONTENTS'
          {
            "images": [
              {"idiom":"iphone","scale":"1x","size":"20x20","filename":"icon-20.png"},
              {"idiom":"iphone","scale":"2x","size":"20x20","filename":"icon-20@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"20x20","filename":"icon-20@3x.png"},
              {"idiom":"iphone","scale":"1x","size":"29x29","filename":"icon-29.png"},
              {"idiom":"iphone","scale":"2x","size":"29x29","filename":"icon-29@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"29x29","filename":"icon-29@3x.png"},
              {"idiom":"iphone","scale":"1x","size":"40x40","filename":"icon-40.png"},
              {"idiom":"iphone","scale":"2x","size":"40x40","filename":"icon-40@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"40x40","filename":"icon-40@3x.png"},
              {"idiom":"iphone","scale":"2x","size":"60x60","filename":"icon-60@2x.png"},
              {"idiom":"iphone","scale":"3x","size":"60x60","filename":"icon-60@3x.png"},
              {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"icon-1024.png"}
            ],
            "info": {"author":"xcode","version":1}
          }
          CONTENTS

      - name: Inject Info.plist privacy strings and build number
        script: |
          PLIST="ios/App/App/Info.plist"
          # Use Codemagic's auto-incrementing build number so each upload is unique
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" "$PLIST"
          # Required privacy strings
          plutil -insert NSLocationWhenInUseUsageDescription -string "This app does not use your location." "$PLIST" 2>/dev/null || true
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "This app does not use your location." "$PLIST" 2>/dev/null || true
          plutil -insert NSCameraUsageDescription -string "This app does not use your camera." "$PLIST" 2>/dev/null || true
          plutil -insert NSPhotoLibraryUsageDescription -string "This app does not use your photo library." "$PLIST" 2>/dev/null || true
          plutil -insert NSMicrophoneUsageDescription -string "This app does not use your microphone." "$PLIST" 2>/dev/null || true

      - name: Set up keychain and signing
        script: |
          keychain initialize
          # Import distribution certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - tricerri@gmail.com
        notify:
          success: true
          failure: true
