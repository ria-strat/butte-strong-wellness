workflows:
  ios-app-store:
    name: Butte Strong Wellness — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      groups:
        - apple_credentials     # APPLE_ID, APP_SPECIFIC_PASSWORD
        - certificate_credentials  # CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: com.buttestrongwellness.app
        APPLE_TEAM_ID: DJAXSSFY8H
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --team-id "$APPLE_TEAM_ID" \
            --create \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD"
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - tricerri@gmail.com
        notify:
          success: true
          failure: true
