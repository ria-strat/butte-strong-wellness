workflows:
  ios-app-store:
    name: Butte Strong Wellness — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      groups:
        - manual_signing  # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      vars:
        BUNDLE_ID: com.buttestrongwellness.app
        APPLE_TEAM_ID: DJAXSSFY8H
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add and sync Capacitor iOS
        script: |
          npx cap add ios
          npx cap sync ios

      - name: Set up keychain and signing
        script: |
          keychain initialize
          # Import distribution certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - tricerri@gmail.com
        notify:
          success: true
          failure: true
